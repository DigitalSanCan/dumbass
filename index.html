<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Andrew</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #07080B;
      --surface: #0E1016;
      --gold: #C9A84C;
      --gold-dim: #8A6E30;
      --text: #EDE9E0;
      --muted: #5C5C5C;
      --border: rgba(255,255,255,0.07);
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      overflow-x: hidden;
    }

    /* Scanline atmosphere */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 3px,
        rgba(0,0,0,0.09) 3px,
        rgba(0,0,0,0.09) 4px
      );
      pointer-events: none;
      z-index: 100;
    }

    /* Vignette */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse at center, transparent 40%, rgba(0,0,0,0.75) 100%);
      pointer-events: none;
      z-index: 99;
    }

    .page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2.5rem 1.5rem;
      gap: 0;
    }

    /* Header */
    .header {
      text-align: center;
      margin-bottom: 2.5rem;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      font-family: 'Cinzel', serif;
      font-size: 10px;
      letter-spacing: 0.3em;
      color: var(--gold);
      text-transform: uppercase;
      margin-bottom: 1.1rem;
    }

    .eyebrow::before,
    .eyebrow::after {
      content: '';
      display: block;
      width: 28px;
      height: 1px;
      background: var(--gold-dim);
    }

    .title {
      font-family: 'Cinzel', serif;
      font-size: clamp(1.6rem, 4vw, 2.8rem);
      font-weight: 600;
      letter-spacing: 0.08em;
      color: var(--text);
      line-height: 1.15;
    }

    /* Video stage */
    .stage {
      width: 100%;
      max-width: 900px;
      position: relative;
    }

    /* Gold corner ornaments */
    .stage::before,
    .stage::after {
      content: '';
      position: absolute;
      width: 18px;
      height: 18px;
      border-color: var(--gold-dim);
      border-style: solid;
      z-index: 2;
    }

    .stage::before {
      top: -6px;
      left: -6px;
      border-width: 1px 0 0 1px;
    }

    .stage::after {
      bottom: -6px;
      right: -6px;
      border-width: 0 1px 1px 0;
    }

    .inner-corners::before,
    .inner-corners::after {
      content: '';
      position: absolute;
      width: 18px;
      height: 18px;
      border-color: var(--gold-dim);
      border-style: solid;
      z-index: 2;
    }

    .inner-corners::before {
      top: -6px;
      right: -6px;
      border-width: 1px 1px 0 0;
    }

    .inner-corners::after {
      bottom: -6px;
      left: -6px;
      border-width: 0 0 1px 1px;
    }

    .video-wrap {
      position: relative;
      width: 100%;
      aspect-ratio: 16 / 9;
      background: #000;
      border: 1px solid var(--border);
    }

    video {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: contain;
      background: #000;
    }

    /* Footer */
    .footer {
      margin-top: 2rem;
      text-align: center;
    }

    .rule {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 1.1rem;
      color: var(--muted);
      font-size: 10px;
      letter-spacing: 0.2em;
      font-family: 'Cinzel', serif;
    }

    .rule::before,
    .rule::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .meta {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 20px;
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 0.06em;
      font-weight: 300;
    }

    .meta span {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .dot {
      width: 3px;
      height: 3px;
      border-radius: 50%;
      background: var(--gold-dim);
      display: inline-block;
    }

    /* Reduced motion */
    @media (prefers-reduced-motion: reduce) {
      body::after { display: none; }
    }

    @media (max-width: 600px) {
      .page { padding: 2rem 1rem; }
      .header { margin-bottom: 1.75rem; }
    }
  </style>
</head>
<body>
  <main class="page" role="main">

    <header class="header">
      <p class="eyebrow">Now Playing</p>
      <h1 class="title">Andrew</h1>
    </header>

    <div class="stage">
      <div class="inner-corners">
        <div class="video-wrap">
          <video controls preload="metadata">
            <source src="video.mp4" type="video/mp4" />
            Your browser does not support video playback.
          </video>
        </div>
      </div>
    </div>

    <footer class="footer">
      <p class="rule">&#9670;</p>
      <div class="meta">
        <span>HD&nbsp;Video</span>
        <span class="dot"></span>
        <span>Use fullscreen for the best experience</span>
      </div>
    </footer>

  </main>
</body>
</html>
